<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Art in Motion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <a href="index.html" class="logo">Art in Motion</a>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="ballet.html">Ballet</a></li>
            <li><a href="modern.html">Modern Dance</a></li>
            <li><a href="folk.html">Folk Dance</a></li>
            <li><a href="stage.html">Stage Skills</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="contact-page">
        <div class="contact-text">
            <h1>Contact</h1>
            <p>Join a class and become part of Art in Motion.</p>
        </div>

        <form id="signupForm" class="contact-form">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name">

            <label for="email">Email address</label>
            <input type="email" id="email" name="email">

            <label for="age">Age</label>
            <input type="number" id="age" name="age">

            <label for="style">Choose dance style</label>
            <select id="style" name="style">
                <option value="">Select style</option>
                <option value="ballet">Ballet</option>
                <option value="modern">Modern Dance</option>
                <option value="folk">Folk Dance</option>
                <option value="stage">Stage Skills</option>
            </select>

            <p class="form-label">Experience level</p>
            <div class="radio-group">
                <label><input type="radio" name="experience" value="beginner"> Beginner</label>
                <label><input type="radio" name="experience" value="advanced"> Advanced</label>
            </div>

            <label for="message">Message</label>
            <textarea id="message" name="message"></textarea>

            <label class="checkbox-label">
                <input type="checkbox" id="agreement">
                I agree with being contacted about the class.
            </label>

            <p id="formMessage"></p>

            <button type="submit" class="btn">Send Application</button>
        </form>
    </section>

</main>

<footer>
    <p>&copy; 2026 Art in Motion | Dance & Stage Academy</p>
</footer>

<script src="script.js"></script>
</body>
</html>
